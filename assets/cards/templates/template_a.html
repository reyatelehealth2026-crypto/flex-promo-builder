<!DOCTYPE html>
<!--
  Template A v4 — การ์ดโปรสินค้าเดี่ยว 1080x1080 (ตรงสไตล์ production จริง)
  พื้นขาว + ชื่อสินค้าสีน้ำเงิน + badge SPECIAL PROMO มุมซ้าย + โลโก้ CNY จริงมุมขวา
  + footer HTML (partial _footer.html) | Layer 0=BG_STYLE / 1=PHOTO / 2=HTML/CSS
-->
<html lang="th">
<head>
<meta charset="utf-8">
<style>
{{TOKENS_CSS}}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:var(--canvas-w); height:var(--canvas-h); }

.frame { width:var(--canvas-w); height:var(--canvas-h); background:var(--cny-yellow);
  padding:var(--frame-pad); position:relative; font-family:var(--font-body); }
.card { width:100%; height:100%; border-radius:var(--card-radius);
  position:relative; overflow:hidden; display:flex; flex-direction:column; {{BG_STYLE}} }

/* badge SPECIAL PROMO มุมบนซ้าย (starburst แดง) */
.badge { position:absolute; top:18px; left:22px; width:150px; height:150px; z-index:6;
  background:var(--cny-red); color:#fff; font-family:var(--font-head); font-weight:800;
  font-size:31px; line-height:1.0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center; letter-spacing:.5px;
  box-shadow:0 6px 14px rgba(0,0,0,.20);
  clip-path:polygon(50% 0,61% 12%,78% 7%,80% 25%,98% 30%,88% 46%,100% 60%,82% 67%,84% 86%,66% 82%,54% 98%,42% 84%,24% 90%,22% 71%,4% 66%,16% 50%,2% 36%,20% 30%,18% 11%,37% 14%); }
.badge small { font-size:23px; font-weight:700; }

/* โลโก้ CNY จริง มุมบนขวา */
.logo { position:absolute; top:34px; right:40px; z-index:6; height:78px; }

/* ชื่อสินค้า (น้ำเงิน) */
.title { margin:46px 180px 0; text-align:center; font-family:var(--font-head);
  font-weight:800; font-size:52px; line-height:1.12; color:var(--cny-blue); }

/* รูปสินค้า (clamp) */
.photo-wrap { flex:1 1 auto; min-height:0; display:flex; align-items:center;
  justify-content:center; padding:28px 70px 6px; }
.photo-wrap img { max-width:82%; max-height:100%; object-fit:contain;
  filter:drop-shadow(0 18px 30px rgba(0,0,0,.20)); }

/* price zone */
.price-zone { flex:0 0 auto; display:flex; align-items:flex-end;
  justify-content:space-between; padding:0 44px 18px; }
.limited-col { display:flex; flex-direction:column; gap:14px; align-items:flex-start; }
.limited { font-family:var(--font-head); font-weight:800; font-size:50px; color:var(--cny-red); line-height:.95; }
.save-burst { background:var(--cny-green); color:#fff; font-family:var(--font-head);
  font-weight:800; font-size:34px; padding:12px 26px; border-radius:14px;
  box-shadow:0 5px 0 rgba(0,0,0,.12); transform:rotate(-4deg); }
.price-col { display:flex; flex-direction:column; align-items:flex-end; }
.code-tag { background:var(--cny-red-deep); color:#fff; font-family:var(--font-head);
  font-weight:700; font-size:28px; padding:6px 24px; border-radius:11px; margin-bottom:10px; }
.price-box { position:relative; border:6px solid var(--cny-red-deep); border-radius:22px;
  background:#fff; padding:30px 34px 18px; text-align:right; min-width:330px; }
.price-box .plabel { position:absolute; top:-22px; left:24px; background:var(--cny-red); color:#fff;
  font-family:var(--font-head); font-weight:700; font-size:25px; padding:5px 20px; border-radius:10px; }
.price-was { font-family:var(--font-body); font-weight:500; font-size:27px; color:var(--cny-gray); text-decoration:line-through; }
.price-now { font-family:var(--font-head); font-weight:800; color:var(--cny-ink); line-height:.92; }
.price-now .baht { font-size:54px; } .price-now .num { font-size:112px; } .price-now .end { font-size:46px; }
.pack-note { font-family:var(--font-body); font-weight:600; font-size:23px; color:var(--cny-red-deep); margin-top:8px; }

/* footer wrapper (partial inject) — footer เหลืองตัดกับการ์ดขาวเอง */
.footer-slot { flex:0 0 auto; }
</style>
</head>
<body>
  <div class="frame"><div class="card">
    <div class="badge">SPECIAL<small>PROMO</small></div>
    <img class="logo" src="{{LOGO}}" alt="CNY HEALTH CARE">

    <div class="title">{{NAME}}</div>

    <div class="photo-wrap"><img src="{{PHOTO}}" alt=""></div>

    <div class="price-zone">
      <div class="limited-col">
        <div class="limited">จำนวนจำกัด</div>
        {{SAVE_BURST}}
      </div>
      <div class="price-col">
        <div class="code-tag">รหัส {{SKU}}</div>
        <div class="price-box">
          <div class="plabel">ราคาพิเศษ</div>
          <div class="price-was">{{PRICE_WAS}}</div>
          <div class="price-now"><span class="baht">฿</span><span class="num">{{PRICE_NOW}}</span><span class="end">.-</span></div>
          <div class="pack-note">{{PACK_NOTE}}</div>
        </div>
      </div>
    </div>

    <div class="footer-slot">{{FOOTER}}</div>
  </div></div>
</body>
</html>
