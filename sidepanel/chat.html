<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>แชทกับ AI — แก้ดีไซน์</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: 'Sarabun', 'Prompt', 'Segoe UI', Tahoma, sans-serif;
    font-size: 14px;
    color: #222;
    background: #f6f6f7;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #E8000D;
    color: #fff;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    flex: 0 0 auto;
  }
  header h1 { font-size: 15px; font-weight: 700; margin: 0; }

  /* mode toggle: แนะนำก่อน / แก้เลย */
  .modes { display: flex; gap: 4px; }
  .modes button {
    border: 1px solid rgba(255,255,255,.6);
    background: transparent;
    color: #fff;
    border-radius: 14px;
    padding: 3px 10px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
  }
  .modes button.active { background: #fff; color: #E8000D; font-weight: 700; }

  #log {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .bubble {
    max-width: 86%;
    padding: 8px 12px;
    border-radius: 14px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble.user {
    align-self: flex-end;
    background: #E8000D;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bubble.ai {
    align-self: flex-start;
    background: #fff;
    border: 1px solid #e3e3e6;
    border-bottom-left-radius: 4px;
  }
  .bubble.sys {
    align-self: center;
    background: #eee;
    color: #666;
    font-size: 12px;
    border-radius: 10px;
  }
  .bubble ul { margin: 6px 0 0; padding-left: 18px; }
  .bubble .apply-btn {
    display: block;
    margin-top: 8px;
    border: none;
    background: #E8000D;
    color: #fff;
    border-radius: 8px;
    padding: 7px 14px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
  }
  .bubble .apply-btn:disabled { background: #aaa; cursor: default; }

  #status {
    flex: 0 0 auto;
    min-height: 18px;
    padding: 2px 14px;
    font-size: 12px;
    color: #888;
  }
  #status.err { color: #E8000D; }

  footer {
    flex: 0 0 auto;
    display: flex;
    gap: 8px;
    padding: 10px 12px 12px;
    background: #fff;
    border-top: 1px solid #e3e3e6;
  }
  #input {
    flex: 1;
    resize: none;
    height: 44px;
    border: 1px solid #d4d4d8;
    border-radius: 10px;
    padding: 10px 12px;
    font-family: inherit;
    font-size: 14px;
  }
  #input:focus { outline: none; border-color: #E8000D; }
  #send {
    border: none;
    background: #E8000D;
    color: #fff;
    border-radius: 10px;
    padding: 0 18px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
  }
  #send:disabled { background: #aaa; cursor: default; }
</style>
</head>
<body>
  <header>
    <h1>แชทกับ AI — แก้ดีไซน์</h1>
    <div class="modes">
      <button id="mode-advise" class="active">แนะนำก่อน</button>
      <button id="mode-apply">แก้เลย</button>
    </div>
  </header>
  <div id="log"></div>
  <div id="status"></div>
  <footer>
    <textarea id="input" placeholder="พิมพ์สิ่งที่อยากแก้ เช่น เปลี่ยนพื้นหลังเป็นสีทอง… (Enter = ส่ง)"></textarea>
    <button id="send">ส่ง</button>
  </footer>
  <script type="module" src="chat.js"></script>
</body>
</html>
